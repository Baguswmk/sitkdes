version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: sitkdes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sitkdes
      POSTGRES_PASSWORD: sitkdes_pass
      POSTGRES_DB: sitkdes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitkdes -d sitkdes_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sitkdes_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
